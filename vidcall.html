<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Video Chat - No Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .copy-id {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .copy-id label {
            font-weight: bold;
            color: #333;
        }

        .copy-id span {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.9em;
            max-width: 300px;
            word-break: break-all;
            color: #667eea;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #764ba2;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.85em;
        }

        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-left: 10px;
        }

        .status.waiting {
            background: #ffc107;
            color: #333;
        }

        .status.connected {
            background: #28a745;
            color: white;
        }

        .status.error {
            background: #dc3545;
            color: white;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .input-section input {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .input-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .video-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .video-box {
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .control-btn {
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .control-btn.primary {
            background: #28a745;
            color: white;
        }

        .control-btn.primary:hover {
            background: #218838;
        }

        .control-btn.danger {
            background: #dc3545;
            color: white;
        }

        .control-btn.danger:hover {
            background: #c82333;
        }

        .control-btn.secondary {
            background: #6c757d;
            color: white;
        }

        .control-btn.secondary:hover {
            background: #5a6268;
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .no-video {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 1.2em;
            color: #999;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .video-container {
                grid-template-columns: 1fr;
            }

            .input-section {
                flex-direction: column;
            }

            .input-section input {
                width: 100%;
            }
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 30px;
            font-size: 0.9em;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📹 Instant Video Chat</h1>
            <p>Join instantly • No registration • Share your link • Start talking</p>
        </div>

        <div class="info-box">
            <div class="copy-id">
                <label>Your ID:</label>
                <span id="myId">Loading...</span>
                <button class="btn btn-small" onclick="copyToClipboard()">Copy</button>
                <span class="status waiting" id="status">Waiting for peers...</span>
            </div>
        </div>

        <div class="input-section">
            <input type="text" id="remoteId" placeholder="Enter peer ID to connect or leave empty to wait for others" />
            <button class="btn" onclick="connectToPeer()">Connect</button>
        </div>

        <div class="video-container" id="videoContainer">
            <div class="video-box">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="video-label">You</div>
                <div id="localVideoPlaceholder" class="no-video">Starting camera...</div>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn secondary" id="toggleAudio" onclick="toggleAudio()">🎤 Mute Audio</button>
            <button class="control-btn secondary" id="toggleVideo" onclick="toggleVideo()">📹 Stop Video</button>
            <button class="control-btn danger" onclick="disconnectAll()">End All Calls</button>
        </div>

        <div class="footer">
            <p>💡 Tip: Share your ID with others or share the page link for them to connect with you</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        let peer;
        let localStream;
        const connections = {}; // Store all connections
        const remoteVideos = {}; // Store remote video elements

        // Initialize PeerJS
        function initPeer() {
            // Generate a unique ID if not provided
            const peerId = generatePeerId();
            
            peer = new Peer(peerId, {
                debug: 0
            });

            peer.on('open', (id) => {
                console.log('My peer ID is: ' + id);
                document.getElementById('myId').textContent = id;
                updateStatus('Ready', 'waiting');
            });

            peer.on('connection', (conn) => {
                console.log('Received connection from:', conn.peer);
                handleConnection(conn);
            });

            peer.on('call', (call) => {
                console.log('Received call from:', call.peer);
                
                if (localStream) {
                    call.answer(localStream);
                    handleCall(call);
                } else {
                    console.log('Local stream not ready yet');
                }
            });

            peer.on('error', (error) => {
                console.error('Peer error:', error);
                updateStatus('Error: ' + error.type, 'error');
            });
        }

        // Generate a simple peer ID
        function generatePeerId() {
            return 'user_' + Math.random().toString(36).substr(2, 9);
        }

        // Start local video stream
        async function startLocalStream() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: true
                });

                const localVideo = document.getElementById('localVideo');
                localVideo.srcObject = localStream;
                
                // Hide placeholder
                const placeholder = document.getElementById('localVideoPlaceholder');
                if (placeholder) {
                    placeholder.style.display = 'none';
                }

                console.log('Local stream started');
                updateStatus('Ready', 'connected');
            } catch (err) {
                console.error('Error accessing media devices:', err);
                updateStatus('Camera/Microphone access denied', 'error');
                alert('Please allow access to camera and microphone to use this service.');
            }
        }

        // Connect to a peer
        function connectToPeer() {
            const remoteId = document.getElementById('remoteId').value.trim();
            if (!remoteId) {
                alert('Please enter a peer ID');
                return;
            }

            if (remoteId === peer.id) {
                alert('You cannot connect to yourself');
                return;
            }

            if (connections[remoteId]) {
                alert('Already connected to this peer');
                return;
            }

            // Create a call to the remote peer
            const call = peer.call(remoteId, localStream);
            handleCall(call);

            // Also create a data connection
            const conn = peer.connect(remoteId);
            handleConnection(conn);

            console.log('Attempting to connect to:', remoteId);
            document.getElementById('remoteId').value = '';
        }

        // Handle incoming/outgoing calls
        function handleCall(call) {
            const peerId = call.peer;

            if (connections[peerId]) {
                console.log('Call already exists with this peer');
                return;
            }

            connections[peerId] = call;

            call.on('stream', (remoteStream) => {
                console.log('Received remote stream from:', peerId);
                displayRemoteVideo(peerId, remoteStream);
                updateStatus('Connected with ' + getShortId(peerId), 'connected');
            });

            call.on('close', () => {
                console.log('Call closed with:', peerId);
                removeRemoteVideo(peerId);
                delete connections[peerId];
                checkConnectionStatus();
            });

            call.on('error', (error) => {
                console.error('Call error with', peerId, ':', error);
                removeRemoteVideo(peerId);
                delete connections[peerId];
                checkConnectionStatus();
            });
        }

        // Handle data connections
        function handleConnection(conn) {
            const peerId = conn.peer;

            conn.on('open', () => {
                console.log('Data connection opened with:', peerId);
            });

            conn.on('close', () => {
                console.log('Data connection closed with:', peerId);
            });

            conn.on('error', (error) => {
                console.error('Connection error:', error);
            });
        }

        // Display remote video
        function displayRemoteVideo(peerId, stream) {
            let videoBox = document.getElementById('video-' + peerId);
            
            if (!videoBox) {
                const container = document.getElementById('videoContainer');
                videoBox = document.createElement('div');
                videoBox.className = 'video-box';
                videoBox.id = 'video-' + peerId;

                const video = document.createElement('video');
                video.autoplay = true;
                video.playsinline = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'cover';

                const label = document.createElement('div');
                label.className = 'video-label';
                label.textContent = 'Peer: ' + getShortId(peerId);

                videoBox.appendChild(video);
                videoBox.appendChild(label);
                container.appendChild(videoBox);

                remoteVideos[peerId] = video;
            }

            remoteVideos[peerId].srcObject = stream;
        }

        // Remove remote video
        function removeRemoteVideo(peerId) {
            const videoBox = document.getElementById('video-' + peerId);
            if (videoBox) {
                videoBox.remove();
            }
            delete remoteVideos[peerId];
        }

        // Toggle audio
        function toggleAudio() {
            if (localStream) {
                const audioTracks = localStream.getAudioTracks();
                audioTracks.forEach(track => {
                    track.enabled = !track.enabled;
                });
                
                const btn = document.getElementById('toggleAudio');
                if (audioTracks[0].enabled) {
                    btn.textContent = '🎤 Mute Audio';
                    btn.style.background = '#6c757d';
                } else {
                    btn.textContent = '🔇 Unmute Audio';
                    btn.style.background = '#dc3545';
                }
            }
        }

        // Toggle video
        function toggleVideo() {
            if (localStream) {
                const videoTracks = localStream.getVideoTracks();
                videoTracks.forEach(track => {
                    track.enabled = !track.enabled;
                });
                
                const btn = document.getElementById('toggleVideo');
                if (videoTracks[0].enabled) {
                    btn.textContent = '📹 Stop Video';
                    btn.style.background = '#6c757d';
                } else {
                    btn.textContent = '📹 Start Video';
                    btn.style.background = '#dc3545';
                }
            }
        }

        // Disconnect all
        function disconnectAll() {
            Object.keys(connections).forEach(peerId => {
                connections[peerId].close();
                delete connections[peerId];
                removeRemoteVideo(peerId);
            });
            updateStatus('Ready', 'waiting');
        }

        // Update status
        function updateStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }

        // Check connection status
        function checkConnectionStatus() {
            if (Object.keys(connections).length === 0) {
                updateStatus('Waiting for peers...', 'waiting');
            }
        }

        // Get short ID for display
        function getShortId(id) {
            return id.substring(id.length - 6);
        }

        // Copy to clipboard
        function copyToClipboard() {
            const myId = document.getElementById('myId').textContent;
            navigator.clipboard.writeText(myId).then(() => {
                alert('ID copied to clipboard!');
            }).catch(() => {
                alert('Failed to copy');
            });
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            initPeer();
            startLocalStream();
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (peer) {
                peer.destroy();
            }
        });
    </script>
</body>
</html>
