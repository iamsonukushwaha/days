<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Video Chat - No Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .copy-id {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .copy-id label {
            font-weight: bold;
            color: #333;
        }

        .copy-id span {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.9em;
            max-width: 300px;
            word-break: break-all;
            color: #667eea;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #764ba2;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.85em;
        }

        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-left: 10px;
        }

        .status.waiting {
            background: #ffc107;
            color: #333;
        }

        .status.connected {
            background: #28a745;
            color: white;
        }

        .status.error {
            background: #dc3545;
            color: white;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .input-section input {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .input-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .video-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .video-box {
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .control-btn {
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .control-btn.primary {
            background: #28a745;
            color: white;
        }

        .control-btn.primary:hover {
            background: #218838;
        }

        .control-btn.danger {
            background: #dc3545;
            color: white;
        }

        .control-btn.danger:hover {
            background: #c82333;
        }

        .control-btn.secondary {
            background: #6c757d;
            color: white;
        }

        .control-btn.secondary:hover {
            background: #5a6268;
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .no-video {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 1.2em;
            color: #999;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .video-container {
                grid-template-columns: 1fr;
            }

            .input-section {
                flex-direction: column;
            }

            .input-section input {
                width: 100%;
            }
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 30px;
            font-size: 0.9em;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📹 Instant Video Chat</h1>
            <p>Join instantly • No registration • Share your link • Start talking</p>
        </div>

        <div class="info-box">
            <div class="copy-id">
                <span class="status waiting" id="status">Connecting to chat room...</span>
            </div>
        </div>

        <div class="video-container" id="videoContainer">
            <div class="video-box">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="video-label">You</div>
                <div id="localVideoPlaceholder" class="no-video">Starting camera...</div>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn secondary" id="toggleAudio" onclick="toggleAudio()">🎤 Mute Audio</button>
            <button class="control-btn secondary" id="toggleVideo" onclick="toggleVideo()">📹 Stop Video</button>
            <button class="control-btn danger" onclick="disconnectAll()">End All Calls</button>
        </div>

        <div class="footer">
            <p>💡 Just open this website - everyone who visits joins the same video call instantly!</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        let peer;
        let localStream;
        const ROOM_ID = 'global_chat_room'; // Everyone in the same room
        const connections = {}; // Store all connections
        const remoteVideos = {}; // Store remote video elements
        
        // Initialize PeerJS
        function initPeer() {
            const peerId = generatePeerId();
            
            // Use PeerJS cloud server for signaling
            peer = new Peer(peerId);

            peer.on('open', (id) => {
                console.log('My peer ID is: ' + id);
                updateStatus('Ready to chat', 'connected');
                // Announce to others in the room
                broadcastPresence(id);
            });

            peer.on('call', (call) => {
                console.log('Received call from:', call.peer);
                
                if (localStream) {
                    call.answer(localStream);
                    handleCall(call);
                } else {
                    console.log('Local stream not ready yet');
                }
            });

            peer.on('error', (error) => {
                console.error('Peer error:', error);
                if (error.type === 'peer-unavailable') {
                    console.log('Peer is not available');
                } else {
                    updateStatus('Error: ' + error.type, 'error');
                }
            });

            peer.on('disconnected', () => {
                console.log('Peer disconnected');
                updateStatus('Reconnecting...', 'waiting');
            });
        }

        // Generate a unique peer ID
        function generatePeerId() {
            return 'user_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        // Broadcast presence to room (using localStorage)
        function broadcastPresence(peerId) {
            const roomData = {
                peers: {},
                timestamp: Date.now()
            };
            
            // Get existing room data
            try {
                const existing = localStorage.getItem('peerjs_' + ROOM_ID);
                if (existing) {
                    const data = JSON.parse(existing);
                    roomData.peers = data.peers || {};
                }
            } catch (e) {
                console.log('localStorage not available');
            }
            
            // Add/update this peer
            roomData.peers[peerId] = {
                timestamp: Date.now(),
                lastSeen: Date.now()
            };
            
            // Clean up old peers (not seen in last 30 seconds)
            Object.keys(roomData.peers).forEach(id => {
                if (Date.now() - roomData.peers[id].lastSeen > 30000) {
                    delete roomData.peers[id];
                }
            });
            
            try {
                localStorage.setItem('peerjs_' + ROOM_ID, JSON.stringify(roomData));
            } catch (e) {
                console.log('localStorage not available');
            }
            
            // Discover and connect to other peers
            discoverPeers();
        }

        // Discover and connect to other peers in the room
        function discoverPeers() {
            try {
                const roomData = localStorage.getItem('peerjs_' + ROOM_ID);
                if (roomData) {
                    const data = JSON.parse(roomData);
                    Object.keys(data.peers).forEach(peerId => {
                        if (peerId !== peer.id && !connections[peerId]) {
                            attemptConnect(peerId);
                        }
                    });
                }
            } catch (e) {
                console.log('Error discovering peers');
            }
        }

        // Attempt to connect to a peer
        function attemptConnect(peerId) {
            if (!localStream) {
                setTimeout(() => attemptConnect(peerId), 1000);
                return;
            }
            
            try {
                const call = peer.call(peerId, localStream);
                handleCall(call);
            } catch (error) {
                console.log('Cannot connect to', peerId, ':', error);
            }
        }

        // Start local video stream
        async function startLocalStream() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: true
                });

                const localVideo = document.getElementById('localVideo');
                localVideo.srcObject = localStream;
                
                const placeholder = document.getElementById('localVideoPlaceholder');
                if (placeholder) {
                    placeholder.style.display = 'none';
                }

                console.log('Local stream started');
                updateStatus('Ready to chat', 'connected');
                
                // Try to connect to peers after stream is ready
                discoverPeers();
            } catch (err) {
                console.error('Error accessing media devices:', err);
                updateStatus('Camera/Microphone access denied', 'error');
                alert('Please allow access to camera and microphone to use this service.');
            }
        }

        // Handle incoming/outgoing calls
        function handleCall(call) {
            const peerId = call.peer;

            if (connections[peerId]) {
                return;
            }

            connections[peerId] = call;

            call.on('stream', (remoteStream) => {
                console.log('Received remote stream from:', peerId);
                displayRemoteVideo(peerId, remoteStream);
                updateStatus('Connected with ' + Object.keys(connections).length + ' peer(s)', 'connected');
            });

            call.on('close', () => {
                console.log('Call closed with:', peerId);
                removeRemoteVideo(peerId);
                delete connections[peerId];
                updateStatus('Connected with ' + Object.keys(connections).length + ' peer(s)', 'connected');
            });

            call.on('error', (error) => {
                console.error('Call error with', peerId, ':', error);
                removeRemoteVideo(peerId);
                delete connections[peerId];
                updateStatus('Connected with ' + Object.keys(connections).length + ' peer(s)', 'connected');
            });
        }

        // Display remote video
        function displayRemoteVideo(peerId, stream) {
            let videoBox = document.getElementById('video-' + peerId);
            
            if (!videoBox) {
                const container = document.getElementById('videoContainer');
                videoBox = document.createElement('div');
                videoBox.className = 'video-box';
                videoBox.id = 'video-' + peerId;

                const video = document.createElement('video');
                video.autoplay = true;
                video.playsinline = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'cover';

                const label = document.createElement('div');
                label.className = 'video-label';
                label.textContent = 'Participant';

                videoBox.appendChild(video);
                videoBox.appendChild(label);
                container.appendChild(videoBox);

                remoteVideos[peerId] = video;
            }

            remoteVideos[peerId].srcObject = stream;
        }

        // Remove remote video and disconnect
        function removeRemoteVideo(peerId) {
            const videoBox = document.getElementById('video-' + peerId);
            if (videoBox) {
                videoBox.remove();
            }
            delete remoteVideos[peerId];
        }

        // Toggle audio
        function toggleAudio() {
            if (localStream) {
                const audioTracks = localStream.getAudioTracks();
                audioTracks.forEach(track => {
                    track.enabled = !track.enabled;
                });
                
                const btn = document.getElementById('toggleAudio');
                if (audioTracks[0].enabled) {
                    btn.textContent = '🎤 Mute Audio';
                    btn.style.background = '#6c757d';
                } else {
                    btn.textContent = '🔇 Unmute Audio';
                    btn.style.background = '#dc3545';
                }
            }
        }

        // Toggle video
        function toggleVideo() {
            if (localStream) {
                const videoTracks = localStream.getVideoTracks();
                videoTracks.forEach(track => {
                    track.enabled = !track.enabled;
                });
                
                const btn = document.getElementById('toggleVideo');
                if (videoTracks[0].enabled) {
                    btn.textContent = '📹 Stop Video';
                    btn.style.background = '#6c757d';
                } else {
                    btn.textContent = '📹 Start Video';
                    btn.style.background = '#dc3545';
                }
            }
        }

        // Disconnect all
        function disconnectAll() {
            Object.keys(connections).forEach(peerId => {
                connections[peerId].close();
                delete connections[peerId];
                removeRemoteVideo(peerId);
            });
            updateStatus('Disconnected from chat', 'waiting');
        }

        // Update status
        function updateStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            initPeer();
            startLocalStream();
            
            // Periodically discover peers
            setInterval(discoverPeers, 5000);
            
            // Update presence
            setInterval(() => {
                if (peer && peer.id) {
                    broadcastPresence(peer.id);
                }
            }, 10000);
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (peer) {
                peer.destroy();
            }
            
            // Remove from room
            try {
                const roomData = localStorage.getItem('peerjs_' + ROOM_ID);
                if (roomData) {
                    const data = JSON.parse(roomData);
                    delete data.peers[peer.id];
                    localStorage.setItem('peerjs_' + ROOM_ID, JSON.stringify(data));
                }
            } catch (e) {
                console.log('Error updating room data');
            }
        });
    </script>
</body>
</html>
